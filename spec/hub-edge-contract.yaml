  /auth/logout:
    post:
      tags:
      - auth
      summary: Logout (invalida sesión local)
      operationId: logout
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '204':
          description: OK
  /auth/edge-transfer:
    post:
      tags:
      - auth
      summary: Token transfer cloud→edge (A.S6 D41)
      operationId: edgeTransfer
      x-scope: cloud-direct
      x-source-bundle: true
      description: 'Endpoint cloud. Recibe edgeJWT, valida y emite cloudAccessToken para que el bundle Hub edge

        ejecute requests cloud-direct (tickets, publicaciones).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - edgeAccessToken
              properties:
                edgeAccessToken:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - cloudAccessToken
                properties:
                  cloudAccessToken:
                    type: string
  /accesos:
    get:
      tags:
      - control-acceso
      summary: Listar accesos
      operationId: listAccesos
      x-scope: edge-required
