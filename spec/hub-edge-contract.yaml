components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT edge-emitido (HS256, clave derivada HKDF del provisioning token).
        Claims: idUsuario, idPermiso, idComplejo, idEdgeAppliance, iat, exp (TTL 12h).
    permisoIdHeader:
      type: apiKey
      in: header
      name: X-Permiso-Id
      description: |
        Contexto del permiso activo. Cloud lo requiere; edge lo extrae del JWT pero
        acepta el header para paridad.

  parameters:
    Filter:
      name: filter
      in: query
      schema: { type: string }
      description: JSON serializado (MongoDB-style operators)
    Sort:
      name: sort
      in: query
      schema: { type: string }
      description: JSON serializado, e.g. `{"fechaCreacion":-1}`
    Populate:
      name: populate
      in: query
      schema: { type: string }
      description: Campos populate separados por coma, e.g. `cliente,complejo`
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 500 }
    Select:
      name: select
      in: query
      schema: { type: string }
      description: Fields projection separados por espacio
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{24}$'
      description: MongoDB ObjectId hex 24 chars

  responses:
    Unauthorized:
      description: JWT inválido o ausente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Acción no permitida por permiso/rol
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # =================
    # Wrappers genéricos (IDocumento, IListado, CountResponse)
    # =================
    CountResponse:
      type: object
      required: [totalCount]
      properties:
        totalCount:
          type: integer

    ErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string

    Documento_Entidad:
      type: object
      required: [dato]
      properties:
        dato:
          type: object
        duration:
          type: number

    Listado_Entidad:
      type: object
      required: [datos]
      properties:
        datos:
          type: array
          items:
            type: object
        totalCount:
          type: integer
        duration:
          type: number

    Documento_Acceso:
      type: object
      required: [dato]
      properties:
        dato:
          $ref: '#/components/schemas/Acceso'
        duration:
          type: number

    Listado_Acceso:
      type: object
      required: [datos]
      properties:
        datos:
          type: array
          items:
            $ref: '#/components/schemas/Acceso'
        totalCount:
          type: integer
        duration:
          type: number

    # =================
    # Auth shapes
    # =================
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [edgeAccessToken, syncOk]
      properties:
        edgeAccessToken:
          type: string
        cloudAccessToken:
          type: string
          description: Solo presente si token transfer A.S6 (D41) tuvo éxito al login
        syncOk:
          type: boolean
          description: '`true` si cloud alcanzable al login; `false` modo degradado'

    MeResponse:
      type: object
      required: [usuario, permiso]
      properties:
        usuario:
          type: object
        permiso:
          type: object
        acciones:
          type: array
          items:
            type: string

    # =================
    # Entities (derivadas de acceso-modelos via z.toJSONSchema)
    # Shape mínima inline; detalle completo en acceso-modelos/dist/json-schema/.
    # Bumpear acceso-modelos regenera schemas; spec sigue por $ref externo en v0.2.0+.
    # =================
    Acceso:
      type: object
      x-source: acceso-modelos/dist/json-schema/AccesoSchema.json
      properties:
        _id: { type: string, pattern: '^[a-f0-9]{24}$' }
        fechaCreacion: { type: string, format: date-time }
        idCliente: { type: string, pattern: '^[a-f0-9]{24}$' }
        idComplejo: { type: string, pattern: '^[a-f0-9]{24}$' }
        nombre: { type: string }
        habilitado: { type: boolean }
        tipo:
          type: string
          enum: [Ingreso, Egreso, Ambos]
        tipoPersona:
          type: string
          enum: [Propietarios, Visitas, Ambos]
        ubicacion:
          type: object
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              items: { type: number }
              minItems: 2
              maxItems: 2
      required: [idCliente, idComplejo, nombre, tipo, tipoPersona]

# ============================================================
# WebSocket events (extensión custom — OpenAPI no cubre WS nativamente)
# ============================================================
x-ws-events:
  description: |
    Eventos Socket.io del Hub edge. Conexión: `/socket.io/` con handshake auth (JWT + X-Permiso-Id query).
    Rooms auto-join: `complejo:<idComplejo>` al conectar. Join explícito: `ticket:join` para tickets cloud-direct.
  server-to-client:
    ingreso-egreso:
      x-scope: edge-required
      payload:
        type: object
        properties:
          op: { type: string, enum: [created, updated] }
          dato:
            type: object
    evento-visita:
      x-scope: edge-required
      payload:
        type: object
        properties:
          op: { type: string, enum: [created, updated] }
          dato:
            type: object
    ticket:
      x-scope: cloud-direct
      description: Bundle edge conecta WS al cloud para tickets (D41)
      payload:
        type: object
    interaccion-ticket:
      x-scope: cloud-direct
      payload:
        type: object
    mensaje-ticket:
      x-scope: cloud-direct
      payload:
        type: object
    subscribed:
      x-scope: edge-required
      payload:
        type: object
    unsubscribed:
      x-scope: edge-required
      payload:
        type: object
    error:
      x-scope: edge-required
      payload:
        $ref: '#/components/schemas/ErrorResponse'
    command-result:
      x-scope: cloud-only
      description: Resultado async de comando dirigido al edge
      payload:
        type: object
    edge-conectividad:
      x-scope: edge-required
      description: Contraparte local del fleet view cloud-only `edge-status:<idComplejo>`
      payload:
        type: object
  client-to-server:
    subscribe:
      x-scope: edge-required
      payload:
        type: object
        properties:
          channels:
            type: array
            items: { type: string }
    unsubscribe:
      x-scope: edge-required
    'ticket:join':
      x-scope: cloud-direct
      payload:
        type: object
        properties:
          idTicket: { type: string }
    'ticket:leave':
      x-scope: cloud-direct
      payload:
        type: object
