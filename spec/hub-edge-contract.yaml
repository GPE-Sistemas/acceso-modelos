  /auth/me/datos-personales:
    put:
      tags:
      - auth
      summary: Actualizar datos personales
      operationId: updateDatosPersonales
      x-scope: cloud-only
      x-source-bundle: false
      description: Cross-tenant edit, cloud-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /auth/me/password:
    put:
      tags:
      - auth
      summary: Cambiar password
      operationId: updatePassword
      x-scope: cloud-only
      x-source-bundle: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - actual
              - nueva
              properties:
                actual:
                  type: string
                nueva:
                  type: string
      responses:
        '200':
          description: OK
  /auth/seleccionar-permiso:
    post:
      tags:
      - auth
      summary: Cambiar permiso activo en sesión multi-permiso
      operationId: seleccionarPermiso
      x-scope: cloud-only
      x-source-bundle: false
      description: Edge tiene un único permiso por sesión (D20). Cloud-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - idPermiso
              properties:
                idPermiso:
                  type: string
      responses:
        '200':
