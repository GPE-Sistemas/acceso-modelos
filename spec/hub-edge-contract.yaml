openapi: 3.1.0
info:
  title: Hub edge contract
  version: 0.1.0
  description: |
    Contrato HTTP+WS del bundle Hub edge (Angular target=edge). Autoritativo por D42 (2026-05-27).
    Cloud (`acceso-api`) y edge (`acceso-edge`) son implementaciones del spec.

    - **Edge**: satisface interface Go generada (`oapi-codegen --generate types,server`)
    - **Cloud**: debe ser superset compatible. CI `acceso-api/.github/workflows/hub-edge-contract-check.yml` falla si rompe shape de path subset.
    - **Harness**: verifica edge vs spec (no edge vs cloud-live).

    Schemas autoatos vía `z.toJSONSchema({target:'openapi-3.0'})` sobre `acceso-modelos`. Ver `./README.md`.

    Estado v0.1.0: declara estructura completa + dominio Auth + Accesos como template. Resto de entities (dispositivos, ingresos-egresos, eventos-visita, panel-guardia, dashboard, master-data, cloud-direct) declarados con shape mínima — completar en sprints siguientes según patrón.
  contact:
    name: GPE Sistemas
  license:
    name: Private

servers:
  - url: https://{idComplejo}.edge.coliving.sh
    description: Edge appliance (target=edge)
    variables:
      idComplejo:
        default: example
        description: Slug del complejo (idComplejo o alias agregado round-robin)
  - url: https://api.coliving.sh
    description: Cloud (paths cloud-direct D41)

tags:
  - name: auth
    description: Login + sesión local del Hub edge
  - name: master-data
    description: Master data Tipo B (replicado del cloud, read-only o write con sync)
  - name: control-acceso
    description: Accesos, dispositivos, credenciales (Tipo B + control físico)
  - name: eventos-visita
    description: Eventos de visita + autorización
  - name: ingresos-egresos
    description: Movimientos físicos (Tipo A, alto volumen, append-only)
  - name: panel-guardia
    description: Vista guardia por categoría (4 proyecciones)
  - name: dashboard
    description: Dashboards locales del complejo
  - name: storage
    description: Storage local del edge (cache + resolve)
  - name: cloud-direct
    description: Paths cloud-direct (D41). Edge no implementa. Bundle llama directo al cloud via HttpInterceptor.

security:
  - bearerAuth: []
    permisoIdHeader: []

paths:
  # ============================================================
  # AUTH (edge-required)
  # ============================================================
  /auth/login:
    post:
      tags: [auth]
      summary: Login local edge
      operationId: login
      x-scope: edge-required
      x-source-bundle: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso. Incluye `cloudAccessToken` si token transfer A.S6 (D41) tuvo éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/google:
    post:
      tags: [auth]
      summary: Login Google OAuth
      operationId: loginGoogle
      x-scope: cloud-only
      x-source-bundle: false
      description: Edge no implementa login externo. Cloud-only by design.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/me:
    get:
      tags: [auth]
      summary: Datos del usuario + permiso activo
      operationId: me
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me/datos-personales:
    put:
      tags: [auth]
      summary: Actualizar datos personales
      operationId: updateDatosPersonales
      x-scope: cloud-only
      x-source-bundle: false
      description: Cross-tenant edit, cloud-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK

  /auth/me/password:
    put:
      tags: [auth]
      summary: Cambiar password
      operationId: updatePassword
      x-scope: cloud-only
      x-source-bundle: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actual, nueva]
              properties:
                actual: { type: string }
                nueva: { type: string }
      responses:
        '200':
          description: OK

  /auth/seleccionar-permiso:
    post:
      tags: [auth]
      summary: Cambiar permiso activo en sesión multi-permiso
      operationId: seleccionarPermiso
      x-scope: cloud-only
      x-source-bundle: false
      description: Edge tiene un único permiso por sesión (D20). Cloud-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idPermiso]
              properties:
                idPermiso: { type: string }
      responses:
        '200':
          description: OK

  /auth/sin-permiso:
    get:
      tags: [auth]
      summary: Login sin permiso seleccionado
      operationId: sinPermiso
      x-scope: cloud-only
      x-source-bundle: false
      responses:
        '200':
          description: OK

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh del JWT (edge JWT)
      operationId: refresh
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout (invalida sesión local)
      operationId: logout
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '204':
          description: OK

  /auth/edge-transfer:
    post:
      tags: [auth]
      summary: Token transfer cloud→edge (A.S6 D41)
      operationId: edgeTransfer
      x-scope: cloud-direct
      x-source-bundle: true
      description: |
        Endpoint cloud. Recibe edgeJWT, valida y emite cloudAccessToken para que el bundle Hub edge
        ejecute requests cloud-direct (tickets, publicaciones).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [edgeAccessToken]
              properties:
                edgeAccessToken: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [cloudAccessToken]
                properties:
                  cloudAccessToken: { type: string }

  # ============================================================
  # ACCESOS (edge-required, Tipo B replicado read-write)
  # Template completo del pattern CRUD + count. Resto de entities siguen este patrón.
  # ============================================================
  /accesos:
    get:
      tags: [control-acceso]
      summary: Listar accesos
      operationId: listAccesos
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Populate'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Select'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listado_Acceso'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [control-acceso]
      summary: Crear acceso
      operationId: createAcceso
      x-scope: edge-required
      x-source-bundle: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Acceso'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Documento_Acceso'

  /accesos/count:
    get:
      tags: [control-acceso]
      summary: Contar accesos
      operationId: countAccesos
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'

  /accesos/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [control-acceso]
      summary: Obtener acceso por id
      operationId: getAcceso
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Documento_Acceso'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [control-acceso]
      summary: Actualizar acceso
      operationId: updateAcceso
      x-scope: edge-required
      x-source-bundle: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Acceso'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Documento_Acceso'
    delete:
      tags: [control-acceso]
      summary: Eliminar acceso
      operationId: deleteAcceso
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Documento_Acceso'

  # ============================================================
  # ENTITIES Tipo B + Tipo A — siguen el patrón CRUD+count de /accesos.
  # Declaradas como skeleton; completar shape detallada en sprints siguientes.
  # ============================================================
  /dispositivos:
    get:
      tags: [control-acceso]
      summary: Listar dispositivos
      operationId: listDispositivos
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Populate'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listado_Entidad'
    # TODO Fase 1.S3.b: POST, PUT, DELETE, count, /:id según pattern accesos

  /credenciales-dispositivos:
    get:
      tags: [control-acceso]
      summary: Listar credenciales (CRUD pattern)
      operationId: listCredenciales
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Populate'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /dispositivos-accesos:
    get:
      tags: [control-acceso]
      summary: Asociación dispositivo↔acceso (CRUD pattern)
      operationId: listDispositivosAccesos
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /ingresos-egresos:
    get:
      tags: [ingresos-egresos]
      summary: Listar ingresos/egresos
      operationId: listIngresosEgresos
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Populate'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }
    post:
      tags: [ingresos-egresos]
      summary: Registrar ingreso/egreso (alto volumen, append-only Tipo A)
      operationId: createIngresoEgreso
      x-scope: edge-required
      x-source-bundle: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Creado, content: { application/json: { schema: { $ref: '#/components/schemas/Documento_Entidad' } } } }
    # TODO Fase 1.S3.b: count, /:id PUT resolver, etc.

  /eventos-visita:
    get:
      tags: [eventos-visita]
      summary: Listar eventos de visita
      operationId: listEventosVisita
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Populate'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }
    # TODO: POST, PATCH /:id, PUT /:id/aprobacion-recurrente

  /vinculos-evento-ingreso:
    get:
      tags: [eventos-visita]
      summary: Vínculos evento↔ingreso (faltante hoy en edge — sumar migration + REST)
      operationId: listVinculosEventoIngreso
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /unidades-funcionales:
    get:
      tags: [master-data]
      summary: Listar UF del complejo
      operationId: listUF
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /usuarios:
    get:
      tags: [master-data]
      summary: Listar usuarios (subset operadores del complejo, read-only edge)
      operationId: listUsuarios
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Populate'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /permisos:
    get:
      tags: [master-data]
      summary: Listar permisos del complejo
      operationId: listPermisos
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Populate'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /roles:
    get:
      tags: [master-data]
      summary: Listar roles (Tipo B replicado read-only)
      operationId: listRoles
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /clientes:
    get:
      tags: [master-data]
      summary: Listar clientes (1 fila — cliente del complejo)
      operationId: listClientes
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /complejos:
    get:
      tags: [master-data]
      summary: Listar complejos (1 fila edge = este complejo)
      operationId: listComplejos
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /vehiculos:
    get:
      tags: [master-data]
      summary: Vehículos (Tipo A bilateral D34)
      operationId: listVehiculos
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /visitantes:
    get:
      tags: [master-data]
      summary: Visitantes (Tipo A bilateral D34)
      operationId: listVisitantes
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /edge-appliances:
    get:
      tags: [master-data]
      summary: Pares del complejo (subset edge-side de IEdgeAppliance)
      operationId: listEdgeAppliances
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  # ============================================================
  # PANEL GUARDIA (edge-required, 4 proyecciones derivadas)
  # ============================================================
  /panel-guardia/propietarios:
    get:
      tags: [panel-guardia]
      summary: Vista guardia — propietarios
      operationId: panelGuardiaPropietarios
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - $ref: '#/components/parameters/Filter'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /panel-guardia/administracion:
    get:
      tags: [panel-guardia]
      summary: Vista guardia — administración
      operationId: panelGuardiaAdministracion
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /panel-guardia/guardia:
    get:
      tags: [panel-guardia]
      summary: Vista guardia — guardia
      operationId: panelGuardiaGuardia
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /panel-guardia/prestadores:
    get:
      tags: [panel-guardia]
      summary: Vista guardia — prestadores
      operationId: panelGuardiaPrestadores
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  # ============================================================
  # DASHBOARD (edge-required local)
  # ============================================================
  /dashboard/resumen:
    get:
      tags: [dashboard]
      summary: Resumen del complejo
      operationId: dashboardResumen
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /dashboard/complejo/mapa:
    get:
      tags: [dashboard]
      summary: Mapa del complejo
      operationId: dashboardMapa
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  # ============================================================
  # STORAGE (edge-required local + signed URLs)
  # ============================================================
  /storage/usage:
    get:
      tags: [storage]
      summary: Uso de storage local edge
      operationId: storageUsage
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /storage/resolve:
    get:
      tags: [storage]
      summary: Resolve objectName → URL signed o cache local
      operationId: storageResolve
      x-scope: edge-required
      x-source-bundle: true
      parameters:
        - name: objectName
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { url: { type: string } } } } } }

  # ============================================================
  # TURNOS / ENCUESTAS / GRUPOS-UF (edge-candidate — pendiente decisión scope)
  # ============================================================
  /turnos:
    get:
      tags: [master-data]
      summary: Turnos UF Común
      operationId: listTurnos
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /plantillas-turno:
    get:
      tags: [master-data]
      summary: Plantillas de turno
      operationId: listPlantillas
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /bloqueos-turnos:
    get:
      tags: [master-data]
      summary: Bloqueos de turnos
      operationId: listBloqueosTurnos
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /tipos-actividad:
    get:
      tags: [master-data]
      summary: Catálogo tipos de actividad
      operationId: listTiposActividad
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /grupos-uf:
    get:
      tags: [master-data]
      summary: Grupos de UF
      operationId: listGruposUF
      x-scope: edge-candidate
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /encuestas:
    get:
      tags: [master-data]
      summary: Encuestas (cloud-only mayormente; respuesta mobile UF)
      operationId: listEncuestas
      x-scope: cloud-only
      x-source-bundle: false
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /contactos-usuario:
    get:
      tags: [master-data]
      summary: Contactos peer-to-peer (cross-tenant)
      operationId: listContactos
      x-scope: cloud-only
      x-source-bundle: false
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  # ============================================================
  # CLOUD-DIRECT (D41) — edge no implementa, bundle llama directo al cloud
  # Documentados acá para que el harness verify-spec los marque skip pero
  # el cloud-router.interceptor.ts conoce el listado canónico.
  # ============================================================
  /tickets:
    get:
      tags: [cloud-direct]
      summary: Tickets (cloud-direct D41)
      operationId: listTickets
      x-scope: cloud-direct
      x-source-bundle: true
      x-cloud-server: https://api.coliving.sh
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /interacciones-ticket:
    get:
      tags: [cloud-direct]
      summary: Interacciones ticket (cloud-direct D41)
      operationId: listInteraccionesTicket
      x-scope: cloud-direct
      x-source-bundle: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Listado_Entidad' } } } }

  /mensajes-ticket:
    get:
      tags: [cloud-direct]
      summary: Mensajes ticket (cloud-direct D41)
      operationId: listMensajesTicket
      x-scope: cloud-direct
      x-source-bundle: true
      responses:
