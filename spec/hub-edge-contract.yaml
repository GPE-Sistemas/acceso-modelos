openapi: 3.1.0
info:
  title: Hub edge contract
  version: 0.2.0
  description: 'Contrato HTTP+WS del bundle Hub edge (Angular target=edge). Autoritativo por D42 (2026-05-27).

    Cloud (`acceso-api`) y edge (`acceso-edge`) son implementaciones del spec.


    - **Edge**: satisface interface Go generada (`oapi-codegen --generate types,server`)

    - **Cloud**: debe ser superset compatible. CI `acceso-api/.github/workflows/hub-edge-contract-check.yml` falla si rompe
    shape de path subset.

    - **Harness**: verifica edge vs spec (no edge vs cloud-live).


    Schemas autoatos vía `z.toJSONSchema({target:''openapi-3.0''})` sobre `acceso-modelos`. Ver `./README.md`.


    Estado v0.1.0: declara estructura completa + dominio Auth + Accesos como template. Resto de entities (dispositivos, ingresos-egresos,
    eventos-visita, panel-guardia, dashboard, master-data, cloud-direct) declarados con shape mínima — completar en sprints
    siguientes según patrón.

    '
  contact:
    name: GPE Sistemas
  license:
    name: Private
servers:
- url: https://{idComplejo}.edge.coliving.sh
  description: Edge appliance (target=edge)
  variables:
    idComplejo:
      default: example
      description: Slug del complejo (idComplejo o alias agregado round-robin)
- url: https://api.coliving.sh
  description: Cloud (paths cloud-direct D41)
tags:
- name: auth
  description: Login + sesión local del Hub edge
- name: master-data
  description: Master data Tipo B (replicado del cloud, read-only o write con sync)
- name: control-acceso
  description: Accesos, dispositivos, credenciales (Tipo B + control físico)
- name: eventos-visita
  description: Eventos de visita + autorización
- name: ingresos-egresos
  description: Movimientos físicos (Tipo A, alto volumen, append-only)
- name: panel-guardia
  description: Vista guardia por categoría (4 proyecciones)
- name: dashboard
  description: Dashboards locales del complejo
- name: storage
  description: Storage local del edge (cache + resolve)
- name: cloud-direct
  description: Paths cloud-direct (D41). Edge no implementa. Bundle llama directo al cloud via HttpInterceptor.
security:
- bearerAuth: []
  permisoIdHeader: []
paths:
  /auth/login:
    post:
      tags:
      - auth
      summary: Login local edge
      operationId: login
      x-scope: edge-required
      x-source-bundle: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso. Incluye `cloudAccessToken` si token transfer A.S6 (D41) tuvo éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/google:
    post:
      tags:
      - auth
      summary: Login Google OAuth
      operationId: loginGoogle
      x-scope: cloud-only
      x-source-bundle: false
      description: Edge no implementa login externo. Cloud-only by design.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - idToken
              properties:
                idToken:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/me:
    get:
      tags:
      - auth
      summary: Datos del usuario + permiso activo
      operationId: me
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
