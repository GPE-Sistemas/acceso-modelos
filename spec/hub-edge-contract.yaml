  /auth/sin-permiso:
    get:
      tags:
      - auth
      summary: Login sin permiso seleccionado
      operationId: sinPermiso
      x-scope: cloud-only
      x-source-bundle: false
      responses:
        '200':
          description: OK
  /auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh del JWT (edge JWT)
      operationId: refresh
      x-scope: edge-required
      x-source-bundle: true
      responses:
        '200':
